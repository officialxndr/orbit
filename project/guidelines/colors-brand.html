<!-- @dsCard group="Colors" viewport="700x180" name="Brand · Orbit Indigo" subtitle="Primary brand ramp — actions, focus, links" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); color: var(--text-strong); }
  .wrap { padding: 22px 24px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); height: 84px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; box-sizing: border-box; box-shadow: var(--shadow-xs); }
  .sw .hex { font-family: var(--font-mono); font-size: 11px; font-weight: 500; }
  .sw .tok { font-size: 11px; opacity: 0.85; margin-top: 1px; }
  .light { color: #fff; }
  .dark { color: var(--ink-900); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw dark"  style="background:var(--orbit-50)"> <span class="hex">#F4F3FD</span><span class="tok">--orbit-50</span></div>
      <div class="sw dark"  style="background:var(--orbit-100)"><span class="hex">#E8E6FB</span><span class="tok">--orbit-100</span></div>
      <div class="sw dark"  style="background:var(--orbit-200)"><span class="hex">#CFCBF6</span><span class="tok">--orbit-200</span></div>
      <div class="sw light" style="background:var(--orbit-400)"><span class="hex">#6A62E8</span><span class="tok">--orbit-400</span></div>
      <div class="sw light" style="background:var(--orbit-600); outline:2px solid var(--orbit-800); outline-offset:2px"><span class="hex">#4B43D9</span><span class="tok">--orbit-600 · primary</span></div>
      <div class="sw light" style="background:var(--orbit-700)"><span class="hex">#3A33B6</span><span class="tok">--orbit-700</span></div>
      <div class="sw light" style="background:var(--orbit-800)"><span class="hex">#2C268C</span><span class="tok">--orbit-800</span></div>
    </div>
  </div>
</body>
</html>
