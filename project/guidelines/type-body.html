<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); color: var(--text-body); }
  .wrap { padding: 22px 26px; max-width: 600px; }
  .row { display: flex; align-items: baseline; gap: 14px; margin-bottom: 9px; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); width: 96px; flex: none; }
  .s17 { font-size: 17px; font-weight: 600; color: var(--text-strong); }
  .s15 { font-size: 15px; font-weight: 400; }
  .s13 { font-size: 13px; font-weight: 500; color: var(--text-muted); }

</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><span class="tag">17 · semibold</span><span class="s17">Reach out to Sam Rivera</span></div>
    <div class="row"><span class="tag">15 · regular</span><span class="s15">Birthday in 4 days · linked to “Plan party”</span></div>
    <div class="row"><span class="tag">13 · medium</span><span class="s13">Last logged contact 21 days ago</span></div>

  </div>
