<!-- @dsCard group="Colors" viewport="700x180" name="Warm neutrals" subtitle="Paper background through near-black ink" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); color: var(--text-strong); }
  .wrap { padding: 22px 24px; }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; border-radius: var(--radius-sm); height: 78px; display: flex; flex-direction: column; justify-content: flex-end; padding: 9px; box-sizing: border-box; border: 1px solid var(--line); }
  .hex { font-family: var(--font-mono); font-size: 10.5px; font-weight: 500; }
  .tok { font-size: 10px; opacity: 0.8; margin-top: 1px; }
  .l { color: #fff; } .d { color: var(--ink-900); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw d" style="background:var(--paper)"><span class="hex">#FAF8F4</span><span class="tok">--paper</span></div>
      <div class="sw d" style="background:var(--paper-sunk)"><span class="hex">#F1ECE4</span><span class="tok">--paper-sunk</span></div>
      <div class="sw d" style="background:var(--fill)"><span class="hex">#F2EDE5</span><span class="tok">--fill</span></div>
      <div class="sw d" style="background:var(--line)"><span class="hex">#E9E3D9</span><span class="tok">--line</span></div>
      <div class="sw d" style="background:var(--ink-300)"><span class="hex">#B7B0A4</span><span class="tok">--ink-300</span></div>
      <div class="sw l" style="background:var(--ink-500)"><span class="hex">#6E6960</span><span class="tok">--ink-500</span></div>
      <div class="sw l" style="background:var(--ink-700)"><span class="hex">#423E37</span><span class="tok">--ink-700</span></div>
      <div class="sw l" style="background:var(--ink-900)"><span class="hex">#1B1A17</span><span class="tok">--ink-900</span></div>
    </div>
  </div>
</body>
</html>
