<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); color: var(--text-strong); }
  .wrap { padding: 20px 24px; display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px 26px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .icons { display: flex; gap: 10px; align-items: center; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); text-transform: uppercase; letter-spacing: 0.1em; }
  .sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { EntityRow, EntityIcon, StreakBadge, ProgressBar, Heatmap } = window.OrbitDesignSystem_f3fc09;
  const heat = [4,3,4,4,0,2,4, 4,4,1,3,4,4,2, 4,3,4,4,4,0,4];
  function Demo() {
    const [a, setA] = React.useState(false);
    const [b, setB] = React.useState(true);
    return (
      <div className="wrap">
        <div className="stack">
          <div className="lbl">EntityRow</div>
          <EntityRow type="task" title="Buy birthday gift" subtitle="Due today · linked to Sam" checked={a} onToggle={setA} />
          <EntityRow type="person" title="Reach out to Sam Rivera" subtitle="21 days since contact"
            trailing={<StreakBadge count={0} active={false} />} />
          <EntityRow type="habit" title="Morning stretch" subtitle="Daily · 7:00 AM"
            trailing={<StreakBadge count={17} />} />
          <EntityRow type="routine" title="Water the plants" subtitle="Every Tuesday" checked={b} onToggle={setB} />
        </div>
        <div className="stack">
          <div className="lbl">EntityIcon</div>
          <div className="icons">
            <EntityIcon type="person" /><EntityIcon type="task" /><EntityIcon type="routine" /><EntityIcon type="habit" /><EntityIcon type="project" />
          </div>
          <div className="lbl" style={{marginTop:6}}>ProgressBar · today 60%</div>
          <ProgressBar value={6} max={10} />
          <div className="sub">6 of 10 done</div>
          <div className="lbl" style={{marginTop:6}}>Heatmap</div>
          <Heatmap data={heat} columns={7} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
